}

function openDetail(id) {
  currentRecipe = RECIPES.find(r => r.id === id);
  if (!currentRecipe) return;
  activeVariant = 0;
  document.getElementById('modalTitle').textContent = currentRecipe.name;
  renderModalBody();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalBody() {
  const r = currentRecipe;
  const v = r.variants[activeVariant];

  const tabs = r.variants.map((vv, i) =>
    `<button class="vtab${i === activeVariant ? ' active' : ''}" onclick="switchTab(${i})">${vv.temp || '茅禄聵猫庐陇'}</button>`
  ).join('');

  const steps = v.steps ? v.steps.split('\n').filter(Boolean).map((s, i) =>
    `<div class="step-row"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`
  ).join('') : '<div style="color:var(--muted);font-size:14px;padding:8px 0">忙職聜忙聴聽忙颅楼茅陋陇猫炉麓忙聵聨</div>';

  const metaPills = [
    v.storeSize ? `冒聼聫陋 茅聴篓氓潞聴茂录職${v.storeSize}` : null,
    v.deliverySize ? `冒聼聯娄 氓陇聳氓聧聳茂录職${v.deliverySize}` : null
  ].filter(Boolean).map(m => `<span class="vmeta-pill">${m}</span>`).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-meta">
      <span class="cat-tag">${r.category}</span>
      ${r.price ? `<span class="modal-price">脗楼${r.price}</span>` : ''}
    </div>
    ${r.variants.length > 1 ? `<div class="vtabs">${tabs}</div>` : ''}
    <div class="vbody">
      ${metaPills ? `<div class="vmeta-row">${metaPills}</div>` : ''}
      <div class="steps-label">氓聢露盲陆聹忙碌聛莽篓聥</div>
      <div>${steps}</div>
    </div>
  `;
}

function switchTab(i) {
  activeVariant = i;
  renderModalBody();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentRecipe = null;
}

// Keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
