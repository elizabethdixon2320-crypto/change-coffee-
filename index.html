<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Pro · 饮品配方</title>
<style>
  :root {
    --brand: #C85A2A;
    --brand-dark: #9B3A14;
    --brand-light: #F5DDD1;
    --bg: #F7F5F3;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #7A7A7A;
    --border: #E8E3DF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: #1C0A00; color: white; padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 17px; font-weight: 700; color: #F5C89A; letter-spacing: 1px; white-space: nowrap; }
  .logo span { color: white; font-weight: 300; }
  .search-wrap { flex: 1; position: relative; }
  .search-input { width: 100%; padding: 9px 14px 9px 38px; border: none; border-radius: 8px; font-size: 14px; background: rgba(255,255,255,0.12); color: white; outline: none; }
  .search-input::placeholder { color: rgba(255,255,255,0.45); }
  .search-input:focus { background: rgba(255,255,255,0.18); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.5; pointer-events: none; }
  .count-badge { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; }

  /* Category bar */
  .cat-bar { background: white; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 4px; padding: 10px 16px; white-space: nowrap; }
  .cat-chip { padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--muted); transition: all 0.15s; font-weight: 500; flex-shrink: 0; }
  .cat-chip:hover { border-color: var(--brand); color: var(--brand); }
  .cat-chip.active { background: var(--brand); color: white; border-color: var(--brand); font-weight: 600; }

  /* Grid */
  .main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .card { background: var(--card); border-radius: 12px; padding: 18px; border: 1px solid var(--border); cursor: pointer; transition: box-shadow 0.2s, transform 0.2s; }
  .card:hover { box-shadow: 0 6px 24px rgba(200,90,42,0.15); transform: translateY(-2px); }
  .card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .cat-tag { font-size: 11px; background: var(--brand-light); color: var(--brand-dark); padding: 2px 9px; border-radius: 10px; font-weight: 600; }
  .price-tag { font-size: 13px; color: var(--brand); font-weight: 700; }
  .temp-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .temp-chip { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #FEF3C7; color: #92400E; font-weight: 500; }
  .card-preview { font-size: 12px; color: var(--muted); margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }

  /* Empty */
  .empty { text-align: center; padding: 80px 20px; color: var(--muted); grid-column: 1/-1; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: flex-end; padding: 0; }
  .overlay.open { display: flex; }
  @media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } }
  .modal { background: white; width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 40px rgba(0,0,0,0.2); }
  @media (min-width: 600px) { .modal { border-radius: 16px; } }
  .modal-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; position: sticky; top: 0; background: white; z-index: 1; border-radius: 20px 20px 0 0; }
  @media (min-width: 600px) { .modal-header { border-radius: 16px 16px 0 0; } }
  .modal-title { font-size: 19px; font-weight: 700; line-height: 1.3; }
  .modal-close { background: var(--bg); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; color: var(--muted); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 18px 20px 28px; }
  .modal-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  .modal-price { font-size: 16px; color: var(--brand); font-weight: 700; }

  /* Variant tabs */
  .vtabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .vtab { padding: 7px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--muted); transition: all 0.15s; font-weight: 500; }
  .vtab:hover { border-color: var(--brand); color: var(--brand); }
  .vtab.active { background: var(--brand); color: white; border-color: var(--brand); font-weight: 600; }
  .vbody { animation: fadeUp 0.15s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .vmeta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .vmeta-pill { font-size: 12px; background: var(--bg); padding: 4px 12px; border-radius: 6px; color: var(--muted); }
  .steps-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .step-row { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .step-row:last-child { border-bottom: none; }
  .step-num { min-width: 24px; height: 24px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 14px; color: var(--text); line-height: 1.65; }
</style>
</head>

<div class="header">
  <div class="header-inner">
    <div class="logo">CHANGE <span>PRO</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜索饮品名称..." oninput="render()">
    </div>
    <div class="count-badge" id="countBadge">39款</div>
  </div>
</div>

<div class="cat-bar">
  <div class="cat-inner" id="catBar"></div>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">

      <button class="modal-close" onclick="closeModal()">✕</button>

  </div>
</div>

  grid.innerHTML = filtered.map(r => {
    const temps = (r.variants||[]).map(v => v.temp).filter(Boolean);
    const tempChips = temps.map(t => `<span class="temp-chip">${t}</span>`).join('');
    const preview = r.variants && r.variants[0] ? r.variants[0].steps.split('\n')[0] : '';
    return `<div class="card" onclick="openDetail('${r.id}')">
      <div class="card-name">${r.name}</div>
      <div class="card-meta">
        <span class="cat-tag">${r.category}</span>
        ${r.price ? `<span class="price-tag">¥${r.price}</span>` : ''}
      </div>
      <div class="temp-chips">${tempChips}</div>
      ${preview ? `<div class="card-preview">${preview}</div>` : ''}
    </div>`;
  }).join('');
}

function setCat(cat) {
  activeCat = cat;
  render();
}

function openDetail(id) {
  currentRecipe = RECIPES.find(r => r.id === id);
  if (!currentRecipe) return;
  activeVariant = 0;
  document.getElementById('modalTitle').textContent = currentRecipe.name;
  renderModalBody();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalBody() {
  const r = currentRecipe;
  const v = r.variants[activeVariant];

  const tabs = r.variants.map((vv, i) =>
    `<button class="vtab${i === activeVariant ? ' active' : ''}" onclick="switchTab(${i})">${vv.temp || '默认'}</button>`
  ).join('');

  const steps = v.steps ? v.steps.split('\n').filter(Boolean).map((s, i) =>
    `<div class="step-row"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`
  ).join('') : '<div style="color:var(--muted);font-size:14px;padding:8px 0">暂无步骤说明</div>';

  const metaPills = [
    v.storeSize ? `🏪 门店：${v.storeSize}` : null,
    v.deliverySize ? `📦 外卖：${v.deliverySize}` : null
  ].filter(Boolean).map(m => `<span class="vmeta-pill">${m}</span>`).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-meta">
      <span class="cat-tag">${r.category}</span>
      ${r.price ? `<span class="modal-price">¥${r.price}</span>` : ''}
    </div>
    ${r.variants.length > 1 ? `<div class="vtabs">${tabs}</div>` : ''}
    <div class="vbody">
      ${metaPills ? `<div class="vmeta-row">${metaPills}</div>` : ''}
      <div class="steps-label">制作流程</div>
      <div>${steps}</div>
    </div>
  `;
}

function switchTab(i) {
  activeVariant = i;
  renderModalBody();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentRecipe = null;
}

// Keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
